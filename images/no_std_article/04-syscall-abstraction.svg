<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .label { font: 700 20px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .mono {
        font: 700 20px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace;
        fill: #0f172a;
      }
      .mono-tight {
        font: 700 19px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace;
        fill: #0f172a;
      }
      .body { font: 500 16px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .side { font: 700 17px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="70" y="70">从 `asm!` 到 `syscall3`：抽象开始在这里长出来</text>
  <text class="subtitle" x="70" y="104">系统软件并不是远离底层，而是在理解底层之后把重复模式包装成可复用接口</text>

  <rect x="130" y="170" width="150" height="470" rx="28" fill="#0f766e"/>
  <text class="side" x="205" y="250" text-anchor="middle">抽象程度</text>
  <text class="side" x="205" y="285" text-anchor="middle">逐层上升</text>
  <text class="side" x="205" y="480" text-anchor="middle">越往下</text>
  <text class="side" x="205" y="515" text-anchor="middle">越贴近 ABI</text>

  <rect x="360" y="480" width="760" height="120" rx="28" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text class="mono" x="740" y="535" text-anchor="middle">core::arch::asm!("syscall")</text>
  <text class="body" x="740" y="570" text-anchor="middle">直接声明寄存器、调用号和 clobber，最贴近指令与 ABI</text>

  <rect x="430" y="320" width="620" height="110" rx="28" fill="#ffffff" stroke="#f59e0b" stroke-width="2"/>
  <text class="mono-tight" x="740" y="375" text-anchor="middle">unsafe fn syscall3(id, arg0, arg1, arg2) -&gt; isize</text>
  <text class="body" x="740" y="407" text-anchor="middle">把“3 个参数 syscall”的共同模式抽出来，形成统一入口</text>

  <rect x="500" y="170" width="480" height="100" rx="28" fill="#ffffff" stroke="#60a5fa" stroke-width="2"/>
  <text class="mono-tight" x="740" y="218" text-anchor="middle">sys_write(fd, buf) / sys_exit(code)</text>
  <text class="body" x="740" y="248" text-anchor="middle">更稳定、更语义化的上层接口</text>

  <path d="M 740 480 V 430" stroke="#64748b" stroke-width="4" fill="none"/>
  <polygon points="740,430 728,450 752,450" fill="#64748b"/>
  <path d="M 740 320 V 270" stroke="#64748b" stroke-width="4" fill="none"/>
  <polygon points="740,270 728,290 752,290" fill="#64748b"/>

  <rect x="1040" y="170" width="160" height="430" rx="28" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text class="label" x="1120" y="225" text-anchor="middle">这一步</text>
  <text class="body" x="1120" y="270" text-anchor="middle">减少重复</text>
  <text class="body" x="1120" y="320" text-anchor="middle">集中封装</text>
  <text class="body" x="1120" y="370" text-anchor="middle">暴露语义</text>
  <text class="body" x="1120" y="420" text-anchor="middle">为跨架构适配</text>
  <text class="body" x="1120" y="450" text-anchor="middle">预留接口层</text>
  <text class="body" x="1120" y="500" text-anchor="middle">这就是系统软件常见的</text>
  <text class="body" x="1120" y="528" text-anchor="middle">分层方式</text>

  <text class="body" x="362" y="666">“抽象”不是逃离底层，而是在充分理解底层约束后，把重复的调用模式沉淀成接口。</text>
</svg>
