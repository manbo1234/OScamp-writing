<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .zone-label { font: 700 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .card-title {
        font: 700 20px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace;
        fill: #0f172a;
      }
      .card-title-tight {
        font: 700 18px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace;
        fill: #0f172a;
      }
      .card-body { font: 500 16px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .small { font: 500 14px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 20; ry: 20; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="title" x="70" y="70">一个 `println!` 背后的完整调用链</text>
  <text class="subtitle" x="70" y="104">从语法糖到驱动，输出一行文字会穿过标准库、libc、syscall 边界和内核对象</text>

  <rect x="60" y="140" width="1160" height="220" rx="28" fill="#e0f2fe"/>
  <text class="zone-label" x="88" y="176">用户态</text>

  <rect x="60" y="400" width="1160" height="250" rx="28" fill="#ecfccb"/>
  <text class="zone-label" x="88" y="436">内核态</text>

  <line x1="110" y1="380" x2="1170" y2="380" stroke="#0f172a" stroke-width="3" class="dashed"/>
  <text class="zone-label" x="640" y="368" text-anchor="middle">特权级切换 / syscall boundary</text>

  <rect class="card" x="90" y="215" width="210" height="100"/>
  <text class="card-title" x="195" y="255" text-anchor="middle">println!("hello")</text>
  <text class="card-body" x="195" y="285" text-anchor="middle">开发者写下的高层接口</text>

  <rect class="card" x="350" y="215" width="210" height="100"/>
  <text class="card-title" x="455" y="255" text-anchor="middle">std::io::Write</text>
  <text class="card-body" x="455" y="285" text-anchor="middle">标准库 I/O 封装</text>

  <rect class="card" x="610" y="215" width="210" height="100"/>
  <text class="card-title" x="715" y="255" text-anchor="middle">libc::write</text>
  <text class="card-body" x="715" y="285" text-anchor="middle">跨到 C ABI 的薄封装</text>

  <rect class="card" x="870" y="215" width="310" height="100"/>
  <text class="card-title-tight" x="1025" y="255" text-anchor="middle">syscall(SYS_write, 1, ...)</text>
  <text class="card-body" x="1025" y="285" text-anchor="middle">准备寄存器并执行特权切换</text>

  <path class="arrow" d="M 300 265 H 350"/>
  <path class="arrow" d="M 560 265 H 610"/>
  <path class="arrow" d="M 820 265 H 870"/>
  <path class="arrow" d="M 1025 315 V 400"/>

  <rect class="card" x="120" y="470" width="210" height="110"/>
  <text class="card-title" x="225" y="512" text-anchor="middle">sys_write</text>
  <text class="card-body" x="225" y="542" text-anchor="middle">内核处理写请求</text>

  <rect class="card" x="400" y="470" width="230" height="110"/>
  <text class="card-title" x="515" y="512" text-anchor="middle">fd_table[1]</text>
  <text class="card-body" x="515" y="542" text-anchor="middle">把整数句柄映射到 stdout</text>

  <rect class="card" x="700" y="470" width="230" height="110"/>
  <text class="card-title" x="815" y="512" text-anchor="middle">stdout 对象</text>
  <text class="card-body" x="815" y="542" text-anchor="middle">找到对应文件或设备抽象</text>

  <rect class="card" x="1000" y="470" width="180" height="110"/>
  <text class="card-title" x="1090" y="512" text-anchor="middle">TTY 驱动</text>
  <text class="card-body" x="1090" y="542" text-anchor="middle">把字符写到终端</text>

  <path class="arrow" d="M 330 525 H 400"/>
  <path class="arrow" d="M 630 525 H 700"/>
  <path class="arrow" d="M 930 525 H 1000"/>

  <text class="small" x="124" y="616">在 `no_std` 学习里，价值正是把这些平时被屏蔽的层次重新暴露出来。</text>
</svg>
