<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #1f497d; }
      .subtitle { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #4b5563; }
      .codebg { fill: #eef4fb; stroke: #9eb6d8; stroke-width: 2; rx: 18; ry: 18; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; ry: 18; }
      .mono { font: 500 17px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace; fill: #0f172a; }
      .body { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .small { font: 500 15px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .cell { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .cell-hit { fill: #fde9d9; stroke: #f79646; stroke-width: 2; }
      .cell-good { fill: #e2f0d9; stroke: #9bbb59; stroke-width: 2; }
      .arrow { stroke: #f79646; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .note { font: 700 20px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #9a3412; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#f79646"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <text class="title" x="70" y="68">内存对齐</text>
  <text class="subtitle" x="70" y="102">先加 align - 1，再清掉低位，得到向上对齐后的地址</text>

  <rect x="70" y="140" width="520" height="470" class="codebg"/>
  <text class="mono" x="100" y="188">aligned = (OFFSET + align - 1) &amp; !(align - 1)</text>
  <text class="body" x="100" y="236">align = 4</text>
  <text class="body" x="100" y="268">!(0b11) = 0b...11111100</text>
  <text class="body" x="100" y="300">清最低 2 位</text>
  <text class="body" x="100" y="338">例: 3 + 3 = 6, 6 &amp; !3 = 4 ✓</text>
  <text class="body" x="100" y="388">pub unsafe fn alloc(size: usize, align: usize) -&gt; *mut u8 {</text>
  <text class="body" x="100" y="420">    let aligned = (OFFSET + align - 1) &amp; !(align - 1);</text>
  <text class="body" x="100" y="452">    if aligned + size &gt; HEAP_SIZE { ... }</text>
  <text class="body" x="100" y="484">    OFFSET = aligned + size;</text>
  <text class="body" x="100" y="516">}</text>

  <rect x="650" y="140" width="560" height="470" class="panel"/>
  <text class="note" x="680" y="184">对齐示意</text>
  <text class="small" x="680" y="214">HEAP: [0  1  2 | 3  4  5  6 | 7 ...]</text>
  <text class="small" x="680" y="242">          ^^^ 3B ^^^        ^^^ 4B, align=4</text>
  <text class="small" x="680" y="270">                    ↑ offset=3, 需要跳到 4</text>

  <rect x="680" y="320" width="480" height="84" class="cell"/>
  <rect x="680" y="320" width="80" height="84" class="cell"/>
  <rect x="760" y="320" width="80" height="84" class="cell"/>
  <rect x="840" y="320" width="80" height="84" class="cell"/>
  <rect x="920" y="320" width="80" height="84" class="cell-hit"/>
  <rect x="1000" y="320" width="80" height="84" class="cell-good"/>
  <rect x="1080" y="320" width="80" height="84" class="cell"/>
  <text class="small" x="920" y="372" text-anchor="middle" fill="#f79646">offset=3</text>
  <text class="small" x="1040" y="372" text-anchor="middle" fill="#9bbb59">aligned=4</text>
  <path class="arrow" d="M 920 292 V 318"/>
  <path class="arrow" d="M 1040 292 V 318"/>

  <text class="small" x="920" y="455" text-anchor="middle">先加 3 → 6，再清低位 → 4</text>
  <text class="small" x="920" y="486" text-anchor="middle">这一步说明分配器已经在满足硬件约束</text>
</svg>
