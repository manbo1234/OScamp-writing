<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font: 700 34px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #1f497d; }
      .subtitle { font: 500 18px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #4b5563; }
      .head { fill: #1f497d; }
      .panel-a { fill: #dce6f1; stroke: #9eb6d8; stroke-width: 2; rx: 22; ry: 22; }
      .panel-b { fill: #fde9d9; stroke: #f4b183; stroke-width: 2; rx: 22; ry: 22; }
      .panel-title { font: 700 26px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .mono { font: 500 18px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace; fill: #0f172a; }
      .big { font: 800 96px 'JetBrains Mono', 'Cascadia Mono', 'Microsoft YaHei UI', 'Microsoft YaHei', monospace; fill: #0f172a; }
      .small { font: 500 15px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .arrow { stroke: #64748b; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .tag { font: 700 16px 'Noto Sans SC', 'Microsoft YaHei', sans-serif; fill: #ffffff; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="1280" height="84" class="head"/>
  <text class="tag" x="70" y="34">PART 1</text>
  <text class="tag" x="70" y="62" font-size="24">一个 println 背后有多少 syscall?</text>
  <text class="subtitle" x="560" y="53" fill="#dbeafe">目标: 把 47 行压到 2 行</text>

  <rect x="70" y="120" width="1120" height="48" rx="12" fill="#eef4fb" stroke="#cdd9ea"/>
  <text class="mono" x="95" y="151">$ strace ./hello 2&gt;&amp;1 | wc -l</text>
  <text class="mono" x="410" y="151">47</text>
  <text class="mono" x="520" y="151">$ strace ./hello 2&gt;&amp;1 | tail -3</text>
  <text class="mono" x="880" y="151">write(1, "hello\n", 6) = 6</text>

  <rect x="70" y="205" width="500" height="390" class="panel-a"/>
  <text class="panel-title" x="330" y="250" text-anchor="middle">println 版本</text>
  <text class="mono" x="110" y="315">mmap, mprotect, read, sigaction, brk ...</text>
  <text class="big" x="330" y="455" text-anchor="middle">47</text>
  <text class="small" x="330" y="515" text-anchor="middle">一个简单的 hello 程序, 背后有 47 个系统调用</text>

  <rect x="710" y="205" width="500" height="390" class="panel-b"/>
  <text class="panel-title" x="960" y="250" text-anchor="middle">no_std + syscall 版本</text>
  <text class="mono" x="760" y="315">write(1, "Hello, OS!\n", 11)</text>
  <text class="big" x="960" y="455" text-anchor="middle">2</text>
  <text class="small" x="960" y="515" text-anchor="middle">write(...) + exit(...)</text>

  <path class="arrow" d="M 570 400 H 710"/>
  <text class="small" x="640" y="382" text-anchor="middle">压缩路径</text>
</svg>
